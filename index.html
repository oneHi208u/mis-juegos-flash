<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <title>Swords and Sandals 2</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #waflashContainer {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>

  <div id="waflashContainer"></div>

  <!-- Script optimizado para inicializar WaFlash sin pantalla en negro -->
  <script>
    var Watson = {
      swf: "juego.swf",
      width: 640,
      height: 480,
      allowFullscreen: true
    };
  </script>
  <script src="https://www.htmlgames.com/embed/waflash/waflash.js"></script>

  <script>
    // Registrar Service Worker para jugar sin internet
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log("Service Worker registrado"))
        .catch(err => console.error("Error SW:", err));
    }
  </script>

</body>
</html>
