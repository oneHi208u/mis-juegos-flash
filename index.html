<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <title>Mi Juego Flash</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    ruffle-player {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <div id="container"></div>

  <!-- Emulador Ruffle cargado desde CDN -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      const container = document.getElementById("container");

      // Configuración de Ruffle ajustada para scripts antiguos (AS2)
      player.config = {
        "allowScriptAccess": true,
        "forceScale": true,
        "quality": "high",
        "wmode": "window",
        "letterbox": "on",
        "upgradeToHttps": false
      };

      container.appendChild(player);

      // Cargar tu archivo .swf (asegúrate de que el nombre coincida)
      player.load("juego.swf");
    });

    // Registrar el Service Worker para jugar sin internet
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log("Service Worker registrado correctamente"))
        .catch(err => console.error("Error al registrar Service Worker:", err));
    }
  </script>

</body>
</html>
