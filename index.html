<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <title>Swords and Sandals 2 - WaFlash</title>
  <style>
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
    }
    #waflash-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #waflash-canvas {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <div id="waflash-container">
    <canvas id="waflash-canvas" tabindex="1"></canvas>
  </div>

  <!-- Carga del motor WaFlash -->
  <script src="https://cdn.jsdelivr.net/gh/waflash/waflash-core@master/waflash-player.min.js"></script>
  <script>
    var createWaFlash = window.createWaFlash;
    if (createWaFlash) {
      createWaFlash({
        SWF_URL: "juego.swf", // Tu archivo SWF
        canvas: document.getElementById("waflash-canvas"),
        unloadOnUnload: true
      });
    }

    // Registrar Service Worker para jugar sin internet
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log("Service Worker listo"))
        .catch(err => console.error("Error SW:", err));
    }
  </script>
</body>
</html>
