<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <title>Swords and Sandals 2 - WaFlash</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #waflashContainer {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <div id="waflashContainer">
    <canvas id="canvas" tabindex="1"></canvas>
  </div>

  <!-- Carga del motor CDN de WaFlash -->
  <script src="https://cdn.jsdelivr.net/gh/waflash/waflash-core@master/waflash-player.min.js"></script>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      if (typeof createWaFlash !== "undefined") {
        createWaFlash({
          SWF_URL: "juego.swf",
          canvas: document.getElementById("canvas"),
          unloadOnUnload: true
        });
      } else {
        console.error("No se pudo cargar el motor de WaFlash.");
      }
    });

    // Registrar el Service Worker para jugar Offline
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log("SW WaFlash activo"))
        .catch(err => console.error("Error SW:", err));
    }
  </script>

</body>
</html>
